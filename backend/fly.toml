# fly.toml app configuration file generated for ME_CORE_Backend_mar_spar

app = "me-core-backend-mar-spar"
primary_region = "sin"  # Singapore for optimal Asia-Pacific latency

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  PORT = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  AGENT_MEMORY_PATH = "/mnt/memory"

[[mounts]]
  source = "me_core_memory_vol"
  destination = "/mnt/memory"

[deploy]
  release_command = "python -c 'import os; os.makedirs(\"/mnt/memory\", exist_ok=True); os.makedirs(\"/app/logs\", exist_ok=True)'"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "30s"
    restart_limit = 0
    timeout = "5s"

  [[services.http_checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    restart_limit = 0
    timeout = "5s"
    tls_skip_verify = false

    [services.http_checks.headers]
      X-Forwarded-Proto = "https"