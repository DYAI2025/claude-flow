version: '3.8'

services:
  # Base MarkerEngine without Spark NLP
  markerengine-base:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: markerengine-base
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-marker_engine}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DETECTOR_PATH=/app/resources/
      - SPARK_NLP_ENABLED=false
    volumes:
      - ./resources:/app/resources:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - markerengine-network

  # MarkerEngine with Spark NLP support
  markerengine-spark:
    build:
      context: .
      dockerfile: Dockerfile
      target: spark
    container_name: markerengine-spark
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-marker_engine}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DETECTOR_PATH=/app/resources/
      - SPARK_NLP_ENABLED=true
      # Spark memory settings
      - SPARK_DRIVER_MEMORY=4g
      - SPARK_EXECUTOR_MEMORY=2g
    volumes:
      - ./resources:/app/resources:ro
      - ./logs:/app/logs
      - spark-data:/tmp/spark
    restart: unless-stopped
    networks:
      - markerengine-network
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 4g

  # Optional: Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: markerengine-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - markerengine-network
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: markerengine-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - markerengine-network
    profiles:
      - monitoring

networks:
  markerengine-network:
    driver: bridge

volumes:
  spark-data:
  prometheus-data:
  grafana-data: